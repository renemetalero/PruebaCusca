spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopping_cart_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never

jwt:
  secret: 1234567890123456789012345678901234567890123456789012345678901234
  expiration-minutes: 120

external:
  fakestore:
    base-url: https://fakestoreapi.com

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
